<!DOCTYPE html>
<html>
<head>
  <title>Message</title>
</head>
<body>

<h2>Please choose an option</h2>

<button onclick="showMessage()">Proceed</button>
<button onclick="goBack()">Return</button>

<div id="message" style="display:none; margin-top:20px;">
  <p>I'm sorry. My name is bla bla bla...</p>
</div>

<script>
function showMessage() {
  document.getElementById("message").style.display = "block";
}

function goBack() {
  window.location.href = "about:blank";
}
</script>

</body>
</html>
